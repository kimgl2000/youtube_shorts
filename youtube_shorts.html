<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shorts">
<meta name="theme-color" content="#000000">
<title>Shorts</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    font-family:"Roboto","Apple SD Gothic Neo",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#000; color:#fff; display:flex; justify-content:center; overflow:hidden;
  }
  #app{ width:100%; max-width:460px; height:100dvh; background:#000; position:relative; overflow:hidden; }

  /* video */
  #vid{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; background:#000; }
  .vshade{ position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(to top, rgba(0,0,0,.55) 0%, rgba(0,0,0,0) 28%),
               linear-gradient(to bottom, rgba(0,0,0,.35) 0%, rgba(0,0,0,0) 18%); }

  /* empty state */
  .empty{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; text-align:center; color:#aaa; padding:30px; }
  .empty .ic{ width:74px;height:74px;border-radius:50%;border:2px dashed #555;display:flex;align-items:center;justify-content:center;}
  .empty .ic svg{ width:34px;height:34px;stroke:#888;fill:none;stroke-width:1.8;}
  .empty p{ font-size:14px; line-height:1.5; }
  .empty button{ background:#fff;color:#000;border:none;border-radius:24px;padding:11px 22px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .empty.hide{ display:none; }

  /* play/pause flash */
  .playflash{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.6);
    width:78px;height:78px;border-radius:50%;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; }
  .playflash svg{ width:38px;height:38px;fill:#fff;}
  .playflash.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }

  /* top bar */
  .top{ position:absolute; top:0; left:0; right:0; z-index:6; display:flex; align-items:center; gap:16px;
    padding:calc(env(safe-area-inset-top) + 12px) 14px 12px; }
  .top .sh{ font-size:20px; font-weight:800; letter-spacing:-.5px; }
  .top .sp{ flex:1; }
  .top .ti{ width:26px;height:26px; }
  .top .ti svg{ width:26px;height:26px; stroke:#fff; fill:none; stroke-width:2; }

  /* right action rail */
  .rail{ position:absolute; right:8px; bottom:calc(env(safe-area-inset-bottom) + 78px); z-index:6;
    display:flex; flex-direction:column; align-items:center; gap:20px; }
  .act{ display:flex; flex-direction:column; align-items:center; gap:5px; background:none; border:none; color:#fff; cursor:pointer; }
  .act .ab{ width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .act svg{ width:30px;height:30px; fill:#fff; }
  .act .cnt{ font-size:12.5px; font-weight:600; }
  .act.liked svg{ fill:#ff4d6d; }
  .disc{ width:38px;height:38px;border-radius:9px;overflow:hidden;border:2px solid #fff;
    background:conic-gradient(#444,#111,#444,#111); display:flex;align-items:center;justify-content:center; animation:spin 4s linear infinite;}
  .disc svg{ width:18px;height:18px;fill:#fff;}
  @keyframes spin{ to{ transform:rotate(360deg);} }

  /* channel avatar with subscribe */
  .chav{ position:relative; width:44px;height:44px; }
  .chav .cimg{ width:44px;height:44px;border-radius:50%;background:#c33 center/cover no-repeat;border:1px solid rgba(255,255,255,.4);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;}
  .chav .plus{ position:absolute; bottom:-7px; left:50%; transform:translateX(-50%);
    width:20px;height:20px;border-radius:50%;background:#f00;border:2px solid #000;display:flex;align-items:center;justify-content:center;}
  .chav .plus svg{ width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.4;}
  .chav.subbed .plus{ background:#444; }

  /* bottom info */
  .info{ position:absolute; left:0; right:62px; bottom:calc(env(safe-area-inset-bottom) + 64px); z-index:6; padding:0 14px; }
  .info .chrow{ display:flex; align-items:center; gap:9px; margin-bottom:9px; }
  .info .chrow .nm{ font-size:14px; font-weight:700; }
  .info .subbtn{ background:#fff; color:#000; border:none; border-radius:18px; padding:6px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  .info .subbtn.on{ background:rgba(255,255,255,.25); color:#fff; }
  .info .title{ font-size:14.5px; font-weight:600; line-height:1.4; margin-bottom:6px; }
  .info .views{ font-size:12.5px; color:#ddd; }
  .info .music{ display:flex; align-items:center; gap:7px; margin-top:9px; font-size:12.5px; color:#eee; }
  .info .music svg{ width:14px;height:14px;fill:#fff; flex:0 0 14px; }
  .info .music .scroll{ white-space:nowrap; overflow:hidden; }
  .info .music .scroll span{ display:inline-block; padding-left:100%; animation:marq 9s linear infinite; }
  @keyframes marq{ to{ transform:translateX(-100%);} }

  /* bottom nav */
  .nav{ position:absolute; left:0; right:0; bottom:0; z-index:7; height:calc(env(safe-area-inset-bottom) + 50px);
    padding-bottom:env(safe-area-inset-bottom); background:#000; border-top:1px solid #1c1c1c;
    display:flex; align-items:center; justify-content:space-around; }
  .nav button{ background:none;border:none;color:#aaa;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;font-family:inherit;}
  .nav button.active{ color:#fff; }
  .nav svg{ width:24px;height:24px; stroke:currentColor; fill:none; stroke-width:1.8; }
  .nav svg.fill{ fill:currentColor; stroke:none; }
  .nav .plusbtn{ width:42px;height:28px;border:1.6px solid #777;border-radius:8px; }
  .nav .plusbtn svg{ width:20px;height:20px; stroke:#fff; }

  /* operator sheet */
  .sheetbg{ position:absolute; inset:0; background:rgba(0,0,0,.5); z-index:20; display:none; align-items:flex-end; }
  .sheetbg.show{ display:flex; }
  .sheet{ width:100%; background:#212121; border-radius:14px 14px 0 0; padding:8px 0 22px; animation:up .22s ease; }
  @keyframes up{ from{transform:translateY(100%);} to{transform:translateY(0);} }
  .sheet .grab{ width:38px;height:4px;background:#555;border-radius:2px;margin:6px auto 12px; }
  .sheet .hint{ padding:2px 22px 8px; font-size:12px; color:#999; }
  .sheet button{ width:100%; background:none;border:none;color:#fff;text-align:left;padding:15px 22px;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:14px;font-family:inherit; }
  .sheet button svg{ width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.9; }
  .sheet button.danger{ color:#ff5a5a; } .sheet button.danger svg{ stroke:#ff5a5a; }
  .hideinput{ display:none; }
</style>
</head>
<body>
<div id="app">
  <video id="vid" loop muted playsinline></video>
  <div class="vshade"></div>

  <div class="empty" id="emptyV">
    <div class="ic"><svg viewBox="0 0 24 24"><polygon points="9 7 17 12 9 17 9 7"/><rect x="3" y="3" width="18" height="18" rx="4"/></svg></div>
    <p>이 Shorts에 영상을 추가하세요.<br>(나중에 언제든 교체할 수 있어요)</p>
    <button onclick="pickVideo()">+ 영상 추가</button>
  </div>

  <div class="playflash" id="flash"><svg id="flashIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>

  <!-- top -->
  <div class="top">
    <div class="sh">Shorts</div>
    <div class="sp"></div>
    <button class="ti" style="background:none;border:none;cursor:pointer;" onclick="toggleMute()" title="소리"><svg id="muteIcon" viewBox="0 0 24 24"><path d="M5 9v6h4l5 5V4L9 9H5z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg></button>
    <div class="ti"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg></div>
  </div>

  <!-- right rail -->
  <div class="rail">
    <div class="chav" id="chav" onclick="toggleSub()">
      <div class="cimg" id="cimg">해</div>
      <div class="plus"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    </div>
    <button class="act" id="likeBtn" onclick="toggleLike()">
      <span class="ab"><svg viewBox="0 0 24 24"><path d="M2 11h4v10H2zM22 11c0-1.1-.9-2-2-2h-5.6l.9-4.3c.1-.5 0-1-.3-1.4l-1-1L8.6 9c-.4.4-.6.9-.6 1.4V19c0 1.1.9 2 2 2h7c.8 0 1.5-.5 1.8-1.2l2.7-6.3c.1-.2.1-.4.1-.6v-1.9z"/></svg></span>
      <span class="cnt" id="likeCnt">1</span>
    </button>
    <button class="act" onclick="this.classList.toggle('liked')">
      <span class="ab"><svg viewBox="0 0 24 24"><path d="M22 13h-4V3h4zM2 13c0 1.1.9 2 2 2h5.6l-.9 4.3c-.1.5 0 1 .3 1.4l1 1L15.4 15c.4-.4.6-.9.6-1.4V5c0-1.1-.9-2-2-2H7c-.8 0-1.5.5-1.8 1.2L2.5 10.5c-.1.2-.1.4-.1.6V13z"/></svg></span>
      <span class="cnt">싫어요</span>
    </button>
    <button class="act">
      <span class="ab"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 01-9 8.4L3 21l1.1-4A8.4 8.4 0 1121 11.5z"/></svg></span>
      <span class="cnt">0</span>
    </button>
    <button class="act">
      <span class="ab"><svg viewBox="0 0 24 24"><path d="M14 9V5l8 7-8 7v-4C8 12 5 16 3 21c0-9 4-12 11-12z"/></svg></span>
      <span class="cnt">공유</span>
    </button>
    <button class="act" onclick="openSheet()">
      <span class="ab"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="12" cy="19" r="1.7"/></svg></span>
    </button>
    <div class="disc"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
  </div>

  <!-- bottom info -->
  <div class="info">
    <div class="chrow">
      <span class="nm">@haeun.log</span>
      <button class="subbtn" id="subBtn" onclick="toggleSub()">구독</button>
    </div>
    <div class="title">민폐고백남 참교육</div>
    <div class="views" id="views">조회수 13회</div>
    <div class="music">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <div class="scroll"><span>원본 오디오 · @haeun.log</span></div>
    </div>
  </div>

  <!-- bottom nav -->
  <div class="nav">
    <button><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/></svg>홈</button>
    <button class="active"><svg class="fill" viewBox="0 0 24 24"><path d="M10 3 4 6.5v11L10 21l4-2.3V21l6-3.5v-11L14 3v2.3L10 3zm0 4.6 4-2.3v9.4l-4 2.3z"/></svg>Shorts</button>
    <button><span class="plusbtn"><svg viewBox="0 0 24 24"><line x1="12" y1="6" x2="12" y2="18"/><line x1="6" y1="12" x2="18" y2="12"/></svg></span></button>
    <button><svg viewBox="0 0 24 24"><rect x="2" y="7" width="14" height="10" rx="2"/><path d="M16 10l6-3v10l-6-3"/></svg>구독</button>
    <button><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>나</button>
  </div>

  <!-- operator sheet -->
  <div class="sheetbg" id="sheetbg" onclick="if(event.target===this)closeSheet()">
    <div class="sheet">
      <div class="grab"></div>
      <div class="hint">감독용 — 화면엔 안 보임</div>
      <button onclick="pickVideo()"><svg viewBox="0 0 24 24"><polygon points="9 7 17 12 9 17 9 7"/><rect x="3" y="3" width="18" height="18" rx="4"/></svg>영상 추가 / 교체</button>
      <button class="danger" onclick="deleteVideo()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>영상 삭제</button>
    </div>
  </div>

  <input type="file" id="vInput" class="hideinput" accept="video/*">
</div>

<script>
const vid=document.getElementById('vid');
const emptyV=document.getElementById('emptyV');
let objUrl=null;

/* IndexedDB for the video blob */
let _db=null;
function openDB(){ if(_db) return Promise.resolve(_db);
  return new Promise((res,rej)=>{ try{
    const r=indexedDB.open('shorts_media',1);
    r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains('m')) r.result.createObjectStore('m'); };
    r.onsuccess=()=>{ _db=r.result; res(_db); }; r.onerror=()=>rej(r.error);
  }catch(e){ rej(e); } });
}
async function dbPut(blob){ const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('m','readwrite'); tx.objectStore('m').put(blob,'short'); tx.oncomplete=()=>res(true); tx.onerror=()=>rej(tx.error); }); }
async function dbGet(){ const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('m','readonly'); const q=tx.objectStore('m').get('short'); q.onsuccess=()=>res(q.result||null); q.onerror=()=>rej(q.error); }); }
async function dbDel(){ try{ const db=await openDB(); return new Promise((res)=>{ const tx=db.transaction('m','readwrite'); tx.objectStore('m').delete('short'); tx.oncomplete=()=>res(); tx.onerror=()=>res(); }); }catch(e){} }

function setVideo(url){
  if(objUrl){ try{ URL.revokeObjectURL(objUrl); }catch(_){ } }
  objUrl=url; vid.src=url; emptyV.classList.add('hide');
  vid.muted=true; updateMute();
  vid.play().catch(()=>{});
}
function clearVideo(){ vid.removeAttribute('src'); vid.load(); emptyV.classList.remove('hide'); }

/* pick / add / replace */
function pickVideo(){ closeSheet(); document.getElementById('vInput').click(); }
document.getElementById('vInput').onchange=async e=>{
  const f=e.target.files[0]; e.target.value=''; if(!f) return;
  const url=URL.createObjectURL(f);
  setVideo(url);
  try{ await dbPut(f); }catch(err){ setTimeout(()=>alert('이 영상은 저장이 안 돼 이번 세션에서만 보입니다. (브라우저 저장 한도/차단)'),120); }
};
async function deleteVideo(){ closeSheet(); await dbDel(); clearVideo(); }

/* tap to play/pause */
function flash(playing){
  const f=document.getElementById('flash'), ic=document.getElementById('flashIcon');
  ic.innerHTML = playing ? '<path d="M8 5v14l11-7z"/>' : '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  f.classList.add('show'); setTimeout(()=>f.classList.remove('show'),420);
}
vid.addEventListener('click',()=>{
  if(!vid.src) return;
  if(vid.paused){ vid.play().catch(()=>{}); flash(true); } else { vid.pause(); flash(false); }
});

/* mute */
function updateMute(){
  document.getElementById('muteIcon').innerHTML = vid.muted
    ? '<path d="M5 9v6h4l5 5V4L9 9H5z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/>'
    : '<path d="M5 9v6h4l5 5V4L9 9H5z"/><path d="M16 8a4 4 0 010 8M19 5a8 8 0 010 14"/>';
}
function toggleMute(){ vid.muted=!vid.muted; updateMute(); if(!vid.paused) vid.play().catch(()=>{}); }

/* like / subscribe */
function toggleLike(){
  const b=document.getElementById('likeBtn'); b.classList.toggle('liked');
  document.getElementById('likeCnt').textContent = b.classList.contains('liked') ? '2' : '1';
}
function toggleSub(){
  const on=document.getElementById('chav').classList.toggle('subbed');
  const sb=document.getElementById('subBtn');
  sb.classList.toggle('on',on); sb.textContent = on ? '구독중' : '구독';
}

/* sheet */
function openSheet(){ document.getElementById('sheetbg').classList.add('show'); }
function closeSheet(){ document.getElementById('sheetbg').classList.remove('show'); }

/* restore saved video */
(async()=>{ try{ const b=await dbGet(); if(b) setVideo(URL.createObjectURL(b)); }catch(e){} })();
</script>
</body>
</html>
